name = "cc-agent-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

# ─── Secrets ─────────────────────────────────────────────────────────────────
# Store your Anthropic key with:
#   npx wrangler secret put ANTHROPIC_API_KEY
# Wrangler encrypts it and injects it as env.ANTHROPIC_API_KEY at runtime.
#
# Set an admin password for the dashboard:
#   npx wrangler secret put ADMIN_TOKEN
# Use any strong string. The login page accepts this token (or the built-in
# "demo" token, which always works for no-auth tryouts).
# Omit ADMIN_TOKEN to fall back to demo-only access.

# ─── KV Namespace ─────────────────────────────────────────────────────────────
# Create with: npx wrangler kv:namespace create APPLICATION_DRAFTS
# Then paste the returned id and preview_id into the block below.
[[kv_namespaces]]
binding = "APPLICATION_DRAFTS"
id = "3e94adc8c9924dcaac0af37f763e11b3"
preview_id = "3e94adc8c9924dcaac0af37f763e11b3"
