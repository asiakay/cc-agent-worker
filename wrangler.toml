name = "cc-agent-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

# ─── Secrets ─────────────────────────────────────────────────────────────────
# Store secrets with wrangler — never commit raw values:
#
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put ADMIN_TOKEN
#   npx wrangler secret put PIPELINE_SECRET    # HMAC key shared with d1_sync.py
#   npx wrangler secret put PIPELINE_WEBHOOK_URL  # optional: external runner URL

# ─── KV Namespace ─────────────────────────────────────────────────────────────
# Create with: npx wrangler kv:namespace create APPLICATION_DRAFTS
[[kv_namespaces]]
binding = "APPLICATION_DRAFTS"
id = "3e94adc8c9924dcaac0af37f763e11b3"
preview_id = "3e94adc8c9924dcaac0af37f763e11b3"

# ─── D1 Database ──────────────────────────────────────────────────────────────
# Create with: npx wrangler d1 create suffolk-cannabis-db
# Apply schema: npx wrangler d1 execute suffolk-cannabis-db --file=./schema.sql
# Then paste the returned database_id below.
[[d1_databases]]
binding     = "PARCEL_DB"
database_name = "suffolk-cannabis-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"
